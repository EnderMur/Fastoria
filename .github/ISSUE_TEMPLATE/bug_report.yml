name: "Отчёт об ошибке / Bug Report"
description: "Шаблон для баг-репортов модпака Minecraft. Please provide details in both Russian and English."
title: "[BUG] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Пожалуйста, заполните весь доступный раздел на русском и английском. / Please fill out the entire form in Russian and English.
  - type: input
    id: minecraft_version
    attributes:
      label: "Версия Minecraft / Modpack version"
      description: "Укажите точную версию Minecraft и модпака. / Provide the exact Minecraft and modpack version."
      placeholder: "Например: 1.20.2, Modpack v1.0.0 / Example: 1.20.2, Modpack v1.0.0"
    validations:
      required: true
  - type: dropdown
    id: loader
    attributes:
      label: "Лоадер / Loader"
      description: "Выберите используемый лоадер. / Choose your loader."
      options:
        - label: "Fabric"
          value: "Fabric"
        - label: "Quilt"
          value: "Quilt"
        - label: "Forge"
          value: "Forge"
        - label: "Другой / Other"
          value: "Другой"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Логи / Logs"
      description: "Вставьте crash-report, latest.log или ссылку на них. / Paste the crash report, latest.log, or a link to them."
      placeholder: "Приложите содержимое crash-report или ссылку на файл. / Attach crash report content or a link to the file."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Шаги воспроизведения / Reproduction steps"
      description: "Опишите шаги, которые привели к ошибке. / Describe the steps that led to the issue."
      placeholder: "1. ... 2. ... 3. ..."
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: "Скриншоты / видео / Screenshots / Video"
      description: "Прикрепите скриншоты или ссылку на видео, если есть. / Attach screenshots or a video link if available."
      placeholder: "Ссылка на изображение или видео / Image or video link"
  - type: textarea
    id: hardware
    attributes:
      label: "Системные параметры / Hardware"
      description: "Укажите RAM, версию Java и другие системные параметры. / Provide RAM, Java version, and other system details."
      placeholder: "Например: 16GB RAM, Java 17, Windows 11 / Example: 16GB RAM, Java 17, Windows 11"
    validations:
      required: true
