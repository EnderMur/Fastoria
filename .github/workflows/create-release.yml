name: Create modpack release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create missing GitHub releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import re
          import subprocess
          import sys
          from pathlib import Path

          changelog_path = Path("changelog.md")
          content = changelog_path.read_text(encoding="utf-8")
          matches = list(re.finditer(r"^###\s+(.+?)\s+\((\d{4}-\d{2}-\d{2})\)\n(.*?)(?=^###\s|\Z)", content, re.MULTILINE | re.DOTALL))
          if not matches:
              raise SystemExit("No release entries found in changelog.md")

          for match in matches:
              tag = match.group(1).strip()
              body = match.group(3).strip()

              exists = subprocess.run(
                  ["gh", "release", "view", tag],
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              if exists.returncode == 0:
                  continue

              result = subprocess.run(
                  ["gh", "release", "create", tag, "--title", tag, "--notes", body],
                  text=True,
              )
              if result.returncode != 0:
                  sys.exit(result.returncode)
          PYEOF
