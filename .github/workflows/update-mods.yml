name: Weekly mod update check

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  update-mods:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Update mods and generate report
        id: update
        run: |
          python3 << 'PYEOF'
          import os, subprocess, sys
          from pathlib import Path
          import tomllib

          def read_mod_state(mod_file: Path):
              try:
                  with open(mod_file, "rb") as f:
                      data = tomllib.load(f)
              except Exception:
                  return None

              update = data.get("update") or {}
              modrinth = update.get("modrinth") or {}

              return {
                  "name": data.get("name") or mod_file.stem,
                  "filename": data.get("filename") or "?",
                  "version": modrinth.get("version") or "?",
              }

          base_dir = Path("modrinth")
          report_lines = []
          any_changes = False

          for version_dir in sorted(base_dir.iterdir()):
              if not version_dir.is_dir():
                  continue
              pack_toml = version_dir / "pack.toml"
              if not pack_toml.exists():
                  continue

              version = version_dir.name
              mods_dir = version_dir / "mods"
              if not mods_dir.is_dir():
                  continue

              old_versions = {}
              for mod_file in mods_dir.glob("*.pw.toml"):
                  state = read_mod_state(mod_file)
                  if state is None:
                      continue
                  old_versions[state["name"]] = state

              # Обновляем моды
              result = subprocess.run(
                  ["packwiz", "update", "--all"],
                  cwd=version_dir,
                  input="y\n",
                  capture_output=True,
                  text=True
              )
              if result.returncode != 0:
                  print(f"⚠️ Ошибка при обновлении версии {version}: {result.stderr}", file=sys.stderr)
                  continue

              subprocess.run(["packwiz", "refresh"], cwd=version_dir, check=True)

              # Считываем новые версии
              new_versions = {}
              for mod_file in mods_dir.glob("*.pw.toml"):
                  state = read_mod_state(mod_file)
                  if state is None:
                      continue
                  new_versions[state["name"]] = state

              updated = []
              for mod_name, new_state in new_versions.items():
                  old_state = old_versions.get(mod_name)
                  if old_state is None:
                      updated.append((mod_name, "—", new_state["version"], "—", new_state["filename"]))
                      continue

                  if old_state["filename"] != new_state["filename"] or old_state["version"] != new_state["version"]:
                      updated.append((
                          mod_name,
                          old_state["version"],
                          new_state["version"],
                          old_state["filename"],
                          new_state["filename"],
                      ))

              if updated:
                  any_changes = True
                  report_lines.append(f"## Minecraft {version}\n")
                  report_lines.append("| Мод | Старая версия | Новая версия | Старый файл | Новый файл |")
                  report_lines.append("|-----|---------------|--------------|-------------|------------|")
                  for name, old_ver, new_ver, old_file, new_file in updated:
                      report_lines.append(f"| {name} | {old_ver} | {new_ver} | {old_file} | {new_file} |")
                  report_lines.append("")
              else:
                  report_lines.append(f"## Minecraft {version} — обновлений нет\n")

          # Передаём результат в GitHub Actions
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"any_changes={str(any_changes).lower()}\n")

          if not any_changes:
              with open("update_report.md", "w", encoding="utf-8") as f:
                  f.write("Обновлений модов не найдено.")
              sys.exit(0)

          with open("update_report.md", "w", encoding="utf-8") as f:
              f.write("\n".join(report_lines))
          PYEOF

      - name: Create Pull Request if changes found
        if: steps.update.outputs.any_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "⬆️ Update mods (weekly automatic check)"
          branch: auto-mod-update
          delete-branch: true
          title: "🔄 Автоматическое обновление модов"
          body-path: update_report.md
          base: main
          labels: mod-update
