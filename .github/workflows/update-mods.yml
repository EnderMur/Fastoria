name: Weekly mod update check

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  update-mods:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Update mods and prepare changelog
        id: update
        run: |
          python3 << 'PYEOF'
          import os
          import json
          import subprocess
          import sys
          from datetime import date
          from pathlib import Path
          import tomllib

          def read_toml(path: Path):
              with open(path, "rb") as f:
                  return tomllib.load(f)

          def load_supported_versions(path: Path):
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
              except FileNotFoundError:
                  raise ValueError(f"Missing versions file: {path}")
              except json.JSONDecodeError as exc:
                  raise ValueError(f"Invalid JSON in {path}: {exc}") from exc

              versions = data.get("versions")
              if not isinstance(versions, list):
                  raise ValueError(f"Expected 'versions' list in {path}")

              supported_versions = set()
              seen_versions = set()

              for entry in versions:
                  if not isinstance(entry, dict):
                      raise ValueError(f"Each version entry must be an object in {path}")

                  name = entry.get("name")
                  supported = entry.get("supported")
                  if not isinstance(name, str) or not name:
                      raise ValueError(f"Each version entry must have a non-empty string 'name' in {path}")
                  if not isinstance(supported, bool):
                      raise ValueError(f"Version '{name}' must have a boolean 'supported' in {path}")
                  if name in seen_versions:
                      raise ValueError(f"Duplicate version entry '{name}' in {path}")

                  seen_versions.add(name)
                  if supported:
                      supported_versions.add(name)

              return supported_versions

          def read_mod_state(mod_file: Path):
              try:
                  data = read_toml(mod_file)
              except Exception:
                  return None

              update = data.get("update") or {}
              modrinth = update.get("modrinth") or {}

              return {
                  "name": data.get("name") or mod_file.stem,
                  "filename": data.get("filename") or "?",
                  "version": modrinth.get("version") or "?",
              }

          def bump_patch(version: str) -> str:
              parts = version.split(".")
              if len(parts) != 3 or not all(part.isdigit() for part in parts):
                  raise ValueError(f"Unsupported version format: {version}")
              parts[2] = str(int(parts[2]) + 1)
              return ".".join(parts)

          def set_pack_version(pack_toml: Path, old_version: str, new_version: str):
              content = pack_toml.read_text(encoding="utf-8")
              target = f'version = "{old_version}"'
              replacement = f'version = "{new_version}"'
              if target not in content:
                  raise ValueError(f"Version string not found in {pack_toml}")
              pack_toml.write_text(content.replace(target, replacement, 1), encoding="utf-8")

          base_dir = Path("modrinth")
          supported_versions = load_supported_versions(Path("versions.json"))
          changelog_entries = []
          release_notes = []
          bumped_versions = []

          for version_dir in sorted(base_dir.iterdir()):
              if not version_dir.is_dir():
                  continue
              if version_dir.name not in supported_versions:
                  continue

              pack_toml = version_dir / "pack.toml"
              if not pack_toml.exists():
                  continue

              pack_data = read_toml(pack_toml)
              minecraft_version = (pack_data.get("versions") or {}).get("minecraft", version_dir.name)
              pack_version = pack_data.get("version")
              mods_dir = version_dir / "mods"
              if not mods_dir.is_dir():
                  continue

              old_versions = {}
              for mod_file in mods_dir.glob("*.pw.toml"):
                  state = read_mod_state(mod_file)
                  if state is not None:
                      old_versions[state["name"]] = state

              result = subprocess.run(
                  ["packwiz", "update", "--all"],
                  cwd=version_dir,
                  input="y\n",
                  capture_output=True,
                  text=True,
              )
              if result.returncode != 0:
                  print(f"Error updating {version_dir.name}: {result.stderr}", file=sys.stderr)
                  sys.exit(result.returncode)

              subprocess.run(["packwiz", "refresh"], cwd=version_dir, check=True)

              new_versions = {}
              for mod_file in mods_dir.glob("*.pw.toml"):
                  state = read_mod_state(mod_file)
                  if state is not None:
                      new_versions[state["name"]] = state

              updated = []
              for mod_name, new_state in sorted(new_versions.items()):
                  old_state = old_versions.get(mod_name)
                  if old_state is None:
                      updated.append((mod_name, "-", new_state["filename"]))
                      continue

                  if old_state["filename"] != new_state["filename"] or old_state["version"] != new_state["version"]:
                      updated.append((mod_name, old_state["filename"], new_state["filename"]))

              if not updated:
                  continue

              new_pack_version = bump_patch(pack_version)
              set_pack_version(pack_toml, pack_version, new_pack_version)
              bumped_versions.append((version_dir.name, minecraft_version, pack_version, new_pack_version))

              pack_tag = f"{version_dir.name}-{new_pack_version}"
              changelog_entries.append((pack_tag, updated))
              release_notes.append(f"## {pack_tag}")
              for mod_name, old_ver, new_ver in updated:
                  line = f"- {mod_name} ({old_ver} -> {new_ver})"
                  release_notes.append(line)
              release_notes.append("")

          any_changes = bool(changelog_entries)

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as f:
              f.write(f"any_changes={'true' if any_changes else 'false'}\n")

          if not any_changes:
              sys.exit(0)

          changelog_path = Path("changelog.md")
          current_changelog = changelog_path.read_text(encoding="utf-8") if changelog_path.exists() else ""
          today = date.today().isoformat()
          if changelog_entries:
              changelog_blocks = []
              for pack_tag, updated in changelog_entries:
                  changelog_blocks.append(f"### {pack_tag} ({today})")
                  changelog_blocks.append("# Update")
                  for mod_name, old_ver, new_ver in updated:
                      changelog_blocks.append(f"* {mod_name} ({old_ver} -> {new_ver})")
                  changelog_blocks.append("")
              new_changelog = "\n".join(changelog_blocks)
              changelog_path.write_text(new_changelog + current_changelog, encoding="utf-8")

          pr_body_lines = ["Автоматическое обновление модов.", ""]
          for version_dir_name, minecraft_version, old_ver, new_ver in bumped_versions:
              pr_body_lines.append(f"- `{version_dir_name}`: `{old_ver}` -> `{new_ver}`")
          pr_body_lines.append("")
          pr_body_lines.extend(release_notes[:-1] if release_notes and not release_notes[-1] else release_notes)

          pr_body = "\n".join(pr_body_lines).strip()

          with output_path.open("a", encoding="utf-8") as f:
              f.write("pr_body<<EOF\n")
              f.write(pr_body + "\n")
              f.write("EOF\n")
          PYEOF

      - name: Create Pull Request if changes found
        if: steps.update.outputs.any_changes == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "⬆️ Update mods (weekly automatic check)"
          branch: auto-mod-update
          delete-branch: true
          title: "🔄 Автоматическое обновление модов"
          body: ${{ steps.update.outputs.pr_body }}
          base: main
          labels: mod-update
